<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>災害箇所配置図</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg: #f4f2ee;
    --panel: #ffffff;
    --ink: #2b2b28;
    --sub: #6b6a63;
    --line: #e2ded5;
    --accent: #b5502f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);overscroll-behavior:none;}
  #app{position:relative;height:100vh;height:100dvh;width:100vw;overflow:hidden;}
  #map{position:absolute;inset:0;}

  /* --- desktop sidebar --- */
  #sidebar{
    position:absolute;top:0;left:0;bottom:0;z-index:900;
    width:300px;min-width:260px;background:var(--panel);border-right:1px solid var(--line);
    padding:18px 16px;overflow-y:auto;
    transition:transform .25s ease;
  }
  #sidebar h1{font-size:16px;margin:0 0 2px;letter-spacing:.02em;}
  #sidebar .subtitle{font-size:11px;color:var(--sub);margin-bottom:16px;}
  .section{margin-bottom:18px;}
  .section-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px;
    border-bottom:1px solid var(--line);padding-bottom:4px;letter-spacing:.03em;}
  select{width:100%;padding:9px 8px;border:1px solid var(--line);border-radius:6px;
    font-size:14px;background:#fff;color:var(--ink);}
  .vendor-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:6px;cursor:pointer;font-size:14px;}
  .vendor-row:hover{background:#f7f4ee;}
  .vendor-row input{accent-color:var(--accent);width:18px;height:18px;flex:0 0 auto;}
  .swatch{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.15);}
  .vendor-name{flex:1;}
  .vendor-count{color:var(--sub);font-size:11px;}
  .btn-row{display:flex;gap:6px;margin-top:8px;}
  .btn-row button{flex:1;font-size:12px;padding:9px 0;border:1px solid var(--line);background:#fff;
    border-radius:6px;cursor:pointer;color:var(--sub);}
  .btn-row button:hover{background:#f7f4ee;color:var(--ink);}
  #stats{font-size:12px;color:var(--sub);line-height:1.7;}
  #stats b{color:var(--ink);}

  .leaflet-popup-content{font-size:13px;line-height:1.6;min-width:190px;}
  .popup-title{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--accent);}
  .popup-row{display:flex;gap:6px;}
  .popup-label{color:var(--sub);flex:0 0 56px;}
  .notion-link{
    display:inline-block;margin-top:6px;font-size:12.5px;color:#fff;background:var(--accent);
    padding:6px 10px;border-radius:5px;text-decoration:none;font-weight:600;
  }
  .notion-link:hover{opacity:.85;}
  .photo-btn{
    display:inline-block;margin-top:6px;margin-left:6px;font-size:12.5px;color:var(--accent);
    background:#fff;border:1px solid var(--accent);padding:5px 10px;border-radius:5px;
    cursor:pointer;font-weight:600;
  }
  .photo-btn:hover{background:#faf1ec;}
  .photo-count{font-size:11.5px;color:var(--sub);margin-top:4px;}
  .photo-thumbs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .photo-thumbs img{width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid var(--line);}
  #photoStats{font-size:12px;color:var(--sub);line-height:1.7;margin-top:8px;}
  #photoStats b{color:var(--ink);}
  #exportBtn{
    width:100%;margin-top:8px;padding:10px 0;border:none;border-radius:6px;
    background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;
  }
  #exportBtn:hover{opacity:.9;}
  #exportBtn:disabled{background:#c8c4ba;cursor:default;}
  .num-badge{
    background:var(--accent);color:#fff;border-radius:50%;
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35);
  }

  /* --- mobile menu button (hidden on desktop) --- */
  #menuToggle{
    display:none;position:absolute;top:12px;left:12px;z-index:950;
    background:var(--panel);border:1px solid var(--line);border-radius:22px;
    padding:10px 16px;font-size:14px;font-weight:700;color:var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,.18);align-items:center;gap:6px;
  }
  #sidebarClose{display:none;}
  #scrim{display:none;position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:850;}

  /* --- mobile layout --- */
  @media (max-width: 820px){
    #menuToggle{display:flex;}
    #sidebar{
      top:auto;left:0;right:0;bottom:0;width:auto;min-width:0;
      max-height:78vh;
      border-right:none;border-top:1px solid var(--line);
      border-radius:16px 16px 0 0;
      box-shadow:0 -4px 20px rgba(0,0,0,.2);
      transform:translateY(100%);
      padding:14px 16px 24px;
    }
    #sidebar.open{transform:translateY(0);}
    #sidebarClose{
      display:block;position:sticky;top:0;margin:-4px -4px 8px auto;
      width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);
      color:var(--sub);font-size:16px;line-height:1;
    }
    #scrim.open{display:block;}
    .vendor-row{padding:10px 4px;}
    .leaflet-popup-content-wrapper{border-radius:10px;}
    .num-badge{width:26px;height:26px;font-size:12px;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="scrim"></div>

  <button id="menuToggle">☰ 一覧・表示設定</button>

  <div id="sidebar">
    <button id="sidebarClose">✕</button>
    <h1>災害箇所配置図</h1>
    <div class="subtitle">日田市 災害調査箇所一覧（全21箇所）</div>

    <div class="section">
      <div class="section-title">背景図</div>
      <select id="baseSelect">
        <option value="gsi_pale">地理院地図（淡色）</option>
        <option value="gsi_std">地理院地図（標準）</option>
        <option value="gsi_photo">地理院地図（写真/航空）</option>
        <option value="osm">OpenStreetMap</option>
      </select>
    </div>

    <div class="section">
      <div class="section-title">業者別表示</div>
      <div id="vendorList"></div>
      <div class="btn-row">
        <button id="btnAll">すべて表示</button>
        <button id="btnNone">すべて非表示</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">集計</div>
      <div id="stats"></div>
    </div>

    <div class="section">
      <div class="section-title">現場写真</div>
      <div id="photoStats">読み込み中…</div>
      <button id="exportBtn">📦 全写真をZIPでエクスポート</button>
      <div class="btn-row">
        <button id="btnClearPhotos">端末内の写真を全削除</button>
      </div>
    </div>
  </div>
</div>

const PALETTE = ["#b5502f","#2f6f8f","#3f8f5f","#a8842f","#7d4fa8","#c25c8a","#4f7d3f","#3f5fa8"];

// --- basemaps ---

  gsi_photo: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {attribution: gsiAttr, maxZoom: 18}),

};

const map = L.map('map', {zoomControl:true, layers:[baseLayers.gsi_pale]}).setView([33.30, 130.95], 11);
let currentBase = 'gsi_pale';

document.getElementById('baseSelect').addEventListener('change', e=>{
  map.removeLayer(baseLayers[currentBase]);
  currentBase = e.target.value;
  baseLayers[currentBase].addTo(map);
});

// --- markers per vendor ---
const markersByVendor = {};

    <div class="popup-row"><span class="popup-label">延長</span><span>${site.encho}</span></div>
    <div class="popup-row"><span class="popup-label">概要</span><span>${site.gaiyo}</span></div>
    <a class="notion-link" href="${site.notion}" target="_blank" rel="noopener">Notionで詳細を見る ↗</a>
    <label class="photo-btn">

    </label>
    <div class="photo-count" id="photo-count-${site.no}">写真：0枚</div>
    <div class="photo-thumbs" id="photo-thumbs-${site.no}"></div>
  `);
  if(!markersByVendor[site.vendor]) markersByVendor[site.vendor] = [];
  markersByVendor[site.vendor].push(marker);
  marker.addTo(map);
});

// --- sidebar vendor list ---
const vendorList = document.getElementById('vendorList');
Object.keys(markersByVendor).sort().forEach(vendor=>{
  const count = markersByVendor[vendor].length;
  const row = document.createElement('label');
  row.className = 'vendor-row';
  row.innerHTML = `
    <input type="checkbox" checked data-vendor="${vendor}">
    <span class="swatch" style="background:${VENDOR_COLORS[vendor]}"></span>
    <span class="vendor-name">${vendor}</span>
    <span class="vendor-count">${count}件</span>
  `;
  vendorList.appendChild(row);
});

vendorList.addEventListener('change', e=>{
  const vendor = e.target.dataset.vendor;
  const show = e.target.checked;
  markersByVendor[vendor].forEach(m=>{
    if(show) m.addTo(map); else map.removeLayer(m);
  });
  updateStats();
});

document.getElementById('btnAll').onclick = ()=>{
  document.querySelectorAll('#vendorList input').forEach(cb=>{cb.checked=true;});
  Object.values(markersByVendor).flat().forEach(m=>m.addTo(map));
  updateStats();
};
document.getElementById('btnNone').onclick = ()=>{
  document.querySelectorAll('#vendorList input').forEach(cb=>{cb.checked=false;});
  Object.values(markersByVendor).flat().forEach(m=>map.removeLayer(m));
  updateStats();
};

function updateStats(){
  const checked = [...document.querySelectorAll('#vendorList input:checked')].map(cb=>cb.dataset.vendor);
  const visibleSites = SITES.filter(s=>checked.includes(s.vendor));
  const total = visibleSites.reduce((a,s)=>a+s.higai,0);
  const byKosyu = {};
  visibleSites.forEach(s=>{ byKosyu[s.kosyu]=(byKosyu[s.kosyu]||0)+1; });
  const kosyuLine = Object.entries(byKosyu).map(([k,v])=>`${k} ${v}件`).join('　');
  document.getElementById('stats').innerHTML = `
    表示中：<b>${visibleSites.length}</b> / ${SITES.length} 箇所<br>
    被害額合計：<b>${total.toLocaleString()}</b> 千円<br>
    ${kosyuLine}
  `;
}
updateStats();

const sidebarClose = document.getElementById('sidebarClose');

function closeSidebar(){ sidebar.classList.remove('open'); scrim.classList.remove('open'); }

menuToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
scrim.addEventListener('click', closeSidebar);

setTimeout(()=> map.invalidateSize(), 300);

// ==================== 写真保存（IndexedDB） ====================
const DB_NAME = 'haichizu_photos_db';
const STORE = 'photos';
let dbPromise = new Promise((resolve, reject)=>{
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e=>{
    const db = e.target.result;
    if(!db.objectStoreNames.contains(STORE)){
      const store = db.createObjectStore(STORE, {keyPath:'id', autoIncrement:true});
      store.createIndex('siteNo', 'siteNo', {unique:false});
    }
  };
  req.onsuccess = e=> resolve(e.target.result);
  req.onerror = e=> reject(e);
});

async function dbAdd(record){
  const db = await dbPromise;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).add(record);
    tx.oncomplete = ()=> resolve();
    tx.onerror = e=> reject(e);
  });
}
async function dbGetBySite(siteNo){
  const db = await dbPromise;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readonly');
    const idx = tx.objectStore(STORE).index('siteNo');
    const req = idx.getAll(siteNo);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = e=> reject(e);
  });
}
async function dbGetAll(){
  const db = await dbPromise;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = e=> reject(e);
  });
}
async function dbClearAll(){
  const db = await dbPromise;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = ()=> resolve();
    tx.onerror = e=> reject(e);
  });
}

function siteByNo(no){ return SITES.find(s=> String(s.no) === String(no)); }

async function refreshPopupPhotoUI(siteNo){
  const countEl = document.getElementById(`photo-count-${siteNo}`);
  const thumbsEl = document.getElementById(`photo-thumbs-${siteNo}`);
  if(!countEl || !thumbsEl) return;
  const records = await dbGetBySite(Number(siteNo));
  countEl.textContent = `写真：${records.length}枚`;
  thumbsEl.innerHTML = '';
  records.forEach(r=>{
    const url = URL.createObjectURL(r.blob);
    const img = document.createElement('img');
    img.src = url;
    thumbsEl.appendChild(img);
  });
}

async function refreshSidebarPhotoStats(){
  const all = await dbGetAll();
  const bySite = {};
  all.forEach(r=>{ bySite[r.siteNo] = (bySite[r.siteNo]||0) + 1; });
  const sitesWithPhotos = Object.keys(bySite).length;
  document.getElementById('photoStats').innerHTML =
    `保存済み：<b>${all.length}</b>枚（<b>${sitesWithPhotos}</b>／${SITES.length}箇所）`;
  document.getElementById('exportBtn').disabled = all.length === 0;
}

// 撮影ボタン：ポップアップ内のfile inputのchangeを委任イベントで拾う
document.addEventListener('change', async e=>{
  if(!e.target.classList || !e.target.classList.contains('photo-input')) return;
  const file = e.target.files[0];
  if(!file) return;
  const siteNo = Number(e.target.dataset.siteNo);
  const site = siteByNo(siteNo);
  await dbAdd({
    siteNo,
    vendor: site ? site.vendor : '',
    kasen: site ? site.kasen : '',
    filename: `No${siteNo}_${Date.now()}.jpg`,
    blob: file,
    ts: Date.now()
  });
  e.target.value = '';
  refreshPopupPhotoUI(siteNo);
  refreshSidebarPhotoStats();
});

// ポップアップが開いた時に、その箇所の写真枚数・サムネイルを表示
map.on('popupopen', e=>{
  const content = e.popup.getElement();
  if(!content) return;
  const input = content.querySelector('.photo-input');
  if(input){
    refreshPopupPhotoUI(input.dataset.siteNo);
  }
});

// ZIPエクスポート
document.getElementById('exportBtn').addEventListener('click', async ()=>{
  const all = await dbGetAll();
  if(all.length === 0) return;
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = '📦 ZIP作成中…';
  const zip = new JSZip();
  all.forEach(r=>{
    const site = siteByNo(r.siteNo);
    const folder = `No${r.siteNo}_${(site?site.kasen:'').replace(/[\\\/:*?"<>|]/g,'')}`;
    zip.folder(folder).file(r.filename, r.blob);
  });
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `災害箇所写真_${today}.zip`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 5000);
  btn.textContent = '📦 全写真をZIPでエクスポート';
  refreshSidebarPhotoStats();
});

document.getElementById('btnClearPhotos').addEventListener('click', async ()=>{
  if(!confirm('端末内に保存した写真をすべて削除します。よろしいですか？（エクスポート前のデータは復元できません）')) return;
  await dbClearAll();
  refreshSidebarPhotoStats();
  SITES.forEach(s=> refreshPopupPhotoUI(s.no));
});

refreshSidebarPhotoStats();
</script>
