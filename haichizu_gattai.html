<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>配置図 合体ツール</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
html,body{height:100%}
#top{padding:10px 14px;background:#185FA5;color:#fff;font-size:16px;font-weight:700}
#panel{padding:14px;border-bottom:1px solid #ddd;background:#f7f9fb}
#panel p{font-size:12.5px;color:#555;margin-bottom:8px;line-height:1.5}
#fileInput{margin-bottom:10px}
#fileList{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.file-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 10px}
.file-row .fname{flex:1;font-size:12.5px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-row .cnt{font-size:11px;color:#888;flex-shrink:0}
.file-row input.label{width:120px;font-size:12.5px;padding:4px 6px;border:1px solid #ccc;border-radius:6px}
.file-row .swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.file-row .rm{background:none;border:none;color:#c0392b;font-size:16px;cursor:pointer;padding:0 4px}
#mergeBtn{background:#185FA5;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
#mergeBtn:disabled{background:#aaa;cursor:not-allowed}
#status{font-size:12.5px;color:#185FA5;margin-top:8px;min-height:16px}
#result{flex:1;display:none;flex-direction:column}
#hd{padding:8px 12px;background:#fff;border-bottom:1px solid #ddd;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#hd select{font-size:12px;padding:4px 6px;border-radius:6px;border:1px solid #ccc}
#wrap{display:flex;flex:1;min-height:0}
#map{flex:1}
#side{width:190px;flex-shrink:0;border-left:1px solid #ddd;background:#fff;display:flex;flex-direction:column}
#side-hd{padding:6px;border-bottom:1px solid #eee;display:flex;gap:4px;flex-wrap:wrap}
#side-hd button{font-size:10.5px;padding:5px 6px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
#side-hd button.dl{background:#185FA5;color:#fff;border-color:#185FA5;flex:1 0 100%}
#legend{padding:6px 8px;border-bottom:1px solid #eee;font-size:10.5px;display:flex;flex-direction:column;gap:3px}
#legend .lg-item{display:flex;align-items:center;gap:5px}
#legend .lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#photo-list{flex:1;overflow-y:auto}
.pl-item{display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid #f2f2f2;cursor:pointer;font-size:11px}
.pl-item:hover{background:#f7f9fb}
.pl-item img{width:36px;height:27px;object-fit:cover;border-radius:3px;flex-shrink:0}
.pl-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333}
.ph-mw{background:#fff;border:2px solid #378ADD;border-radius:6px;padding:2px;box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer}
.ph-mw img{display:block;border-radius:3px;object-fit:cover}
.ph-ml{font-size:9px;text-align:center;background:rgba(0,0,0,.65);color:#fff;padding:1px 3px;border-radius:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-mn{position:absolute;top:-8px;left:-8px;width:18px;height:18px;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;line-height:1}
#app{display:flex;flex-direction:column;height:100vh}
</style>
</head><body>
<div id="app">
<div id="top">🧩 配置図 合体ツール（複数班・複数日のデータを1つの全体図にまとめる）</div>
<div id="panel">
  <p>「保存・提出」で書き出した配置図HTML（複数の班・複数の日のもの）を選んでください。班や日付のラベルは自由に書き換えられます。前回作った「全体図」HTMLを読み込んで、そこに新しい分を追加合体することもできます。</p>
  <input type="file" id="fileInput" accept=".html" multiple>
  <div id="fileList"></div>
  <button id="mergeBtn" disabled onclick="doMerge()">🧩 合体して全体図を作成</button>
  <div id="status"></div>
</div>
<div id="result">
  <div id="hd"><b>災害調査 全体配置図</b><span id="hd-sub" style="color:#888;font-size:11px;flex:1"></span><select id="layer-sel" onchange="changeLayer(this.value)"></select></div>
  <div id="wrap">
    <div id="map"></div>
    <div id="side">
      <div id="legend"></div>
      <div id="side-hd">
        <button onclick="selectAllPhotos(true)">全選択</button>
        <button onclick="selectAllPhotos(false)">全解除</button>
        <button class="dl" onclick="downloadSelected()">⬇ 選択した写真を一括DL（ZIP）</button>
        <button class="dl" onclick="downloadCombinedHTML()">💾 全体図をHTMLで保存</button>
      </div>
      <div id="photo-list"></div>
    </div>
  </div>
</div>
</div>
<script>
const TILES={
  osm:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',attr:'&copy; OpenStreetMap',max:19},
  gsi:{url:'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',attr:'地理院タイル',max:18},
  gsip:{url:'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',attr:'地理院タイル(航空写真)',max:18},
  gsil:{url:'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',attr:'地理院タイル(淡色)',max:18},
  gmap:{url:'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',attr:'Google Maps',max:20},
  gsat:{url:'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',attr:'Google Satellite',max:20}
};
const LAYER_LABELS={osm:'🗺 OpenStreetMap',gsi:'📍 地理院標準',gsip:'🗾 地理院航空',gsil:'📋 地理院淡色',gmap:'🌐 Googleマップ',gsat:'🛰 Google航空'};
const PALETTE=['#185FA5','#E24B4A','#2E9E5B','#B8860B','#8E44AD','#D2691E','#0E7C86','#C2185B'];

let loadedFiles=[]; // {file, name, label, count, color}
let mergedData=[];  // combined photos

const fileInput=document.getElementById('fileInput');
fileInput.addEventListener('change',async()=>{
  const files=Array.from(fileInput.files);
  for(const f of files){
    const text=await f.text();
    const extracted=extractData(text);
    if(!extracted){
      alert('「'+f.name+'」からは写真データを読み取れませんでした。saigai_chosa.htmlの「保存・提出」で書き出したHTML、または本ツールで作った全体図HTMLを選んでください。');
      continue;
    }
    loadedFiles.push({
      file:f,
      name:f.name,
      label:extracted.defaultLabel,
      photos:extracted.photos,
      count:extracted.photos.length,
      color:PALETTE[loadedFiles.length%PALETTE.length]
    });
  }
  fileInput.value='';
  renderFileList();
});

function extractData(text){
  // 本ツール／saigai_chosa.htmlのexportHTMLが埋め込む "const data=[...];" を取り出す
  const m=text.match(/const data=(\[[\s\S]*?\]);\s*\n\s*(?:data\.forEach|\/\/)/);
  if(!m)return null;
  let arr;
  try{ arr=JSON.parse(m[1]); }catch(e){ return null; }
  if(!Array.isArray(arr)||!arr.length)return null;
  const titleMatch=text.match(/<title>(.*?)<\/title>/);
  let defaultLabel='';
  if(titleMatch){
    const tm=titleMatch[1].match(/(\d{4}\/\d{1,2}\/\d{1,2})/);
    defaultLabel=tm?tm[1]:titleMatch[1].replace('災害調査写真配置図','').trim();
  }
  // 既にラベル付きで合体済みのファイルを読み込んだ場合、班ごとの色分け情報を保持
  return {photos:arr,defaultLabel:defaultLabel||'(日付不明)'};
}

function renderFileList(){
  const list=document.getElementById('fileList');
  list.innerHTML=loadedFiles.map((f,i)=>`
    <div class="file-row">
      <span class="swatch" style="background:${f.color}"></span>
      <span class="fname">${escapeHtml(f.name)}</span>
      <span class="cnt">${f.count}枚</span>
      <input class="label" value="${escapeHtml(f.label)}" placeholder="班/日付ラベル" onchange="updateLabel(${i},this.value)">
      <button class="rm" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');
  document.getElementById('mergeBtn').disabled=loadedFiles.length===0;
}
function updateLabel(i,v){ loadedFiles[i].label=v; }
function removeFile(i){ loadedFiles.splice(i,1); renderFileList(); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function doMerge(){
  if(!loadedFiles.length)return;
  mergedData=[];
  let seq=0;
  loadedFiles.forEach((f)=>{
    f.photos.forEach(p=>{
      seq++;
      mergedData.push({
        id:'g'+seq+'_'+p.id,
        num:p.num,
        name:p.name,
        lat:p.lat,
        lng:p.lng,
        b64:p.b64,
        _label:f.label,
        _color:f.color,
        _sel:true
      });
    });
  });
  detectExactDuplicates();
  const dupCount=mergedData.filter(p=>p._dup).length;
  document.getElementById('status').innerHTML='✅ '+loadedFiles.length+'件のファイル・合計'+mergedData.length+'枚を合体しました。'
    +(dupCount?'<br>⚠ 完全に同じ写真データが'+dupCount+'枚見つかりました（一覧・地図上に赤枠で表示）。位置情報では判定していないので、内容が違う写真は誤検知されません。':'');
  document.getElementById('result').style.display='flex';
  document.getElementById('hd-sub').textContent=mergedData.length+'枚 / '+loadedFiles.length+'ファイル分';
  initMapIfNeeded();
  renderLegend();
  renderPhotoList();
  renderMarkers();
  const allLatLngs=mergedData.map(p=>[p.lat,p.lng]);
  if(allLatLngs.length===1){map.setView(allLatLngs[0],17);}else{map.fitBounds(allLatLngs,{padding:[40,40]});}
}

function detectExactDuplicates(){
  const byHash={};
  mergedData.forEach(p=>{ p._dup=false; });
  mergedData.forEach(p=>{
    const key=p.b64; // 写真データが1バイトでも違えば別キーになる＝完全一致のみ検知
    if(!byHash[key])byHash[key]=[];
    byHash[key].push(p);
  });
  Object.values(byHash).forEach(group=>{
    if(group.length>1)group.forEach(p=>p._dup=true);
  });
}

let map=null,curLayer=null,_mapInited=false;
function initMapIfNeeded(){
  if(_mapInited)return;
  _mapInited=true;
  map=L.map('map');
  changeLayer('osm');
  const sel=document.getElementById('layer-sel');
  Object.keys(TILES).forEach(k=>{
    const o=document.createElement('option');o.value=k;o.textContent=LAYER_LABELS[k]||k;sel.appendChild(o);
  });
  sel.value='osm';
  map.on('zoomend moveend',renderMarkers);
}
function changeLayer(key){
  if(curLayer)map.removeLayer(curLayer);
  const t=TILES[key];
  curLayer=L.tileLayer(t.url,{attribution:t.attr,maxZoom:t.max}).addTo(map);
}

function renderLegend(){
  const uniq=[];
  loadedFiles.forEach(f=>{ if(!uniq.find(u=>u.label===f.label)) uniq.push({label:f.label,color:f.color}); });
  document.getElementById('legend').innerHTML=uniq.map(u=>
    `<div class="lg-item"><span class="lg-dot" style="background:${u.color}"></span>${escapeHtml(u.label)}</div>`
  ).join('');
}

function renderPhotoList(){
  const list=document.getElementById('photo-list');
  list.innerHTML=mergedData.map(p=>
    '<div class="pl-item" style="'+(p._dup?'background:#fdeaea':'')+'">'
    +'<input type="checkbox" '+(p._sel?'checked':'')+' onclick="event.stopPropagation();toggleSelPhoto(\''+p.id+'\',this.checked)">'
    +'<img src="'+p.b64+'" style="'+(p._dup?'border:2px solid #c0392b':'')+'" onclick="focusPhoto(\''+p.id+'\')">'
    +'<span onclick="focusPhoto(\''+p.id+'\')">'+(p._dup?'⚠ ':'')+'['+escapeHtml(p._label)+'] No.'+p.num+' '+escapeHtml(p.name)+'</span>'
    +'</div>'
  ).join('');
}
function toggleSelPhoto(id,checked){ const p=mergedData.find(d=>d.id===id); if(p)p._sel=checked; }
function selectAllPhotos(v){ mergedData.forEach(p=>p._sel=v); renderPhotoList(); }
function focusPhoto(id){
  const p=mergedData.find(d=>d.id===id);
  if(!p)return;
  map.setView([p.lat,p.lng],Math.max(map.getZoom(),17));
  openPopupFor(p);
}
let activePopup=null;
function openPopupFor(p){
  if(activePopup)map.closePopup(activePopup);
  activePopup=L.popup({maxWidth:260})
    .setLatLng([p.lat,p.lng])
    .setContent('<div style="text-align:center"><img src="'+p.b64+'" style="max-width:220px;border-radius:6px"><div style="font-size:12px;margin-top:4px">['+escapeHtml(p._label)+'] No.'+p.num+' '+escapeHtml(p.name)+'</div></div>')
    .openOn(map);
}

function declutter(){
  const THRESH=54;
  const pts=mergedData.map(p=>({p,pt:map.latLngToLayerPoint([p.lat,p.lng])}));
  const used=new Array(pts.length).fill(false);
  const groups=[];
  for(let i=0;i<pts.length;i++){
    if(used[i])continue;
    const group=[pts[i]];used[i]=true;
    for(let j=i+1;j<pts.length;j++){
      if(used[j])continue;
      if(pts[i].pt.distanceTo(pts[j].pt)<THRESH){group.push(pts[j]);used[j]=true;}
    }
    groups.push(group);
  }
  groups.forEach(group=>{
    if(group.length===1){
      group[0].p._disp=[group[0].p.lat,group[0].p.lng];
    }else{
      const n=group.length;
      const radius=58+Math.min(n,6)*10;
      const spread=Math.min(300,40*n);
      const start=-90-spread/2;
      group.forEach((g,idx)=>{
        const angleDeg=start+(n>1?(spread/(n-1))*idx:0);
        const rad=angleDeg*Math.PI/180;
        const offPt=L.point(g.pt.x+radius*Math.cos(rad),g.pt.y+radius*Math.sin(rad));
        const newLatLng=map.layerPointToLatLng(offPt);
        g.p._disp=[newLatLng.lat,newLatLng.lng];
      });
    }
  });
}
function renderMarkers(){
  if(!map||!mergedData.length)return;
  if(window._markerLayer)map.removeLayer(window._markerLayer);
  if(window._lineLayer)map.removeLayer(window._lineLayer);
  window._markerLayer=L.layerGroup().addTo(map);
  window._lineLayer=L.layerGroup().addTo(map);
  declutter();
  mergedData.forEach(p=>{
    const disp=p._disp||[p.lat,p.lng];
    const differs=Math.abs(disp[0]-p.lat)>1e-8||Math.abs(disp[1]-p.lng)>1e-8;
    if(differs){
      L.polyline([[p.lat,p.lng],disp],{color:p._color,weight:2,opacity:.75}).addTo(window._lineLayer);
      L.circleMarker([p.lat,p.lng],{radius:5,color:'#fff',weight:2,fillColor:p._color,fillOpacity:1}).addTo(window._lineLayer);
    }
    const sz=68;
    const borderColor=p._dup?'#c0392b':p._color;
    const dupBadge=p._dup?'<div style="position:absolute;top:-8px;right:-8px;width:18px;height:18px;background:#c0392b;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff">⚠</div>':'';
    const icon=L.divIcon({className:'',html:'<div class="ph-mw" style="width:'+sz+'px;border-color:'+borderColor+(p._dup?';border-width:3px':'')+'"><div class="ph-mn" style="background:'+p._color+'">'+p.num+'</div>'+dupBadge+'<img src="'+p.b64+'" style="width:'+sz+'px;height:'+(sz*3/4|0)+'px"><div class="ph-ml">'+escapeHtml(p._label)+'</div></div>',iconSize:[sz+4,(sz*3/4|0)+20],iconAnchor:[sz/2+2,(sz*3/4|0)/2+10]});
    L.marker(disp,{icon}).addTo(window._markerLayer).on('click',()=>openPopupFor(p));
  });
}

async function downloadSelected(){
  const sel=mergedData.filter(p=>p._sel);
  if(!sel.length){alert('写真を選択してください');return;}
  const zip=new JSZip();
  sel.forEach(p=>{
    const base64Data=p.b64.split(',')[1];
    const safeName=('['+p._label+']No'+p.num+'_'+p.name).replace(/[\\/:*?"<>|]/g,'_');
    zip.file(safeName+'.jpg',base64Data,{base64:true});
  });
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='全体図写真一式_'+tsStamp()+'.zip';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

function tsStamp(){
  const now=new Date();
  return now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'_'+('0'+now.getHours()).slice(-2)+('0'+now.getMinutes()).slice(-2);
}

// 「全体図をHTMLで保存」＝この合体ツール自身と同じ形式で書き出す。
// 書き出したファイルは、後日また本ツールに読み込ませて追加合体できる。
function downloadCombinedHTML(){
  if(!mergedData.length)return;
  const dataForExport=mergedData.map(p=>({id:p.id,num:p.num,name:p.name,lat:p.lat,lng:p.lng,b64:p.b64,label:p._label,color:p._color,dup:!!p._dup}));
  const html=buildStandaloneHTML(dataForExport);
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='全体図_'+tsStamp()+'.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

function buildStandaloneHTML(dataForExport){
  const tilesJson=JSON.stringify(TILES);
  const now=new Date();
  const ts=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  // 「本ツールで再読込→追加合体」できるよう、通常のexportHTMLと同じ "const data=[...]" 形式（labelは互換のためnameに影響させない）で埋め込む
  return `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>災害調査写真配置図（全体図） ${ts}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"><\/script>
<style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}#hd{padding:8px 12px;background:#fff;border-bottom:1px solid #ddd;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}#wrap{display:flex;height:calc(100vh - 36px)}#map{flex:1}#side{width:190px;flex-shrink:0;border-left:1px solid #ddd;background:#fff;display:flex;flex-direction:column}#side-hd{padding:6px;border-bottom:1px solid #eee;display:flex;gap:4px;flex-wrap:wrap}#side-hd button{font-size:10.5px;padding:5px 6px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}#side-hd button.dl{background:#185FA5;color:#fff;border-color:#185FA5;flex:1 0 100%}#legend{padding:6px 8px;border-bottom:1px solid #eee;font-size:10.5px}#legend .lg-item{display:flex;align-items:center;gap:5px;margin-bottom:3px}#legend .lg-dot{width:10px;height:10px;border-radius:50%}#photo-list{flex:1;overflow-y:auto}.pl-item{display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid #f2f2f2;cursor:pointer;font-size:11px}.pl-item img{width:36px;height:27px;object-fit:cover;border-radius:3px}.ph-mw{background:#fff;border:2px solid;border-radius:6px;padding:2px;box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer}.ph-mw img{display:block;border-radius:3px;object-fit:cover}.ph-ml{font-size:9px;text-align:center;background:rgba(0,0,0,.65);color:#fff;padding:1px 3px;border-radius:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ph-mn{position:absolute;top:-8px;left:-8px;width:18px;height:18px;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;line-height:1}</style>
</head><body>
<div id="hd"><b>災害調査 全体配置図</b><span style="color:#888;font-size:11px;flex:1">${ts} / ${dataForExport.length}枚</span><select id="layer-sel" onchange="changeLayer(this.value)"></select></div>
<div id="wrap">
<div id="map"></div>
<div id="side">
  <div id="legend"></div>
  <div id="side-hd">
    <button onclick="selectAllPhotos(true)">全選択</button>
    <button onclick="selectAllPhotos(false)">全解除</button>
    <button class="dl" onclick="downloadSelected()">⬇ 選択した写真を一括DL（ZIP）</button>
  </div>
  <div id="photo-list"></div>
</div>
</div>
<script>
const TILES=${tilesJson};
const map=L.map('map');
let curLayer=null;
function changeLayer(key){
  if(curLayer)map.removeLayer(curLayer);
  const t=TILES[key];
  curLayer=L.tileLayer(t.url,{attribution:t.attr,maxZoom:t.max}).addTo(map);
}
const sel=document.getElementById('layer-sel');
const LAYER_LABELS={osm:'🗺 OpenStreetMap',gsi:'📍 地理院標準',gsip:'🗾 地理院航空',gsil:'📋 地理院淡色',gmap:'🌐 Googleマップ',gsat:'🛰 Google航空'};
Object.keys(TILES).forEach(k=>{
  const o=document.createElement('option');o.value=k;o.textContent=LAYER_LABELS[k]||k;sel.appendChild(o);
});
sel.value='osm';
changeLayer('osm');

const data=${JSON.stringify(dataForExport)};
data.forEach(p=>{p._sel=true;});

const uniqLabels=[];
data.forEach(p=>{ if(!uniqLabels.find(u=>u.label===p.label)) uniqLabels.push({label:p.label,color:p.color}); });
document.getElementById('legend').innerHTML=uniqLabels.map(u=>
  '<div class="lg-item"><span class="lg-dot" style="background:'+u.color+'"></span>'+u.label+'</div>'
).join('');

function renderPhotoList(){
  const list=document.getElementById('photo-list');
  list.innerHTML=data.map(p=>
    '<div class="pl-item">'
    +'<input type="checkbox" '+(p._sel?'checked':'')+' onclick="event.stopPropagation();toggleSelPhoto(\\''+p.id+'\\',this.checked)">'
    +'<img src="'+p.b64+'" onclick="focusPhoto(\\''+p.id+'\\')">'
    +'<span onclick="focusPhoto(\\''+p.id+'\\')">['+p.label+'] No.'+p.num+' '+p.name+'</span>'
    +'</div>'
  ).join('');
}
function toggleSelPhoto(id,checked){
  const p=data.find(d=>d.id===id);
  if(p)p._sel=checked;
}
function selectAllPhotos(v){
  data.forEach(p=>p._sel=v);
  renderPhotoList();
}
let activePopup=null;
function focusPhoto(id){
  const p=data.find(d=>d.id===id);
  if(!p)return;
  map.setView([p.lat,p.lng],Math.max(map.getZoom(),17));
  if(activePopup)map.closePopup(activePopup);
  activePopup=L.popup({maxWidth:260}).setLatLng([p.lat,p.lng]).setContent('<div style="text-align:center"><img src="'+p.b64+'" style="max-width:220px;border-radius:6px"><div style="font-size:12px;margin-top:4px">['+p.label+'] No.'+p.num+' '+p.name+'</div></div>').openOn(map);
}
async function downloadSelected(){
  const sel=data.filter(p=>p._sel);
  if(!sel.length){alert('写真を選択してください');return;}
  const zip=new JSZip();
  sel.forEach(p=>{
    const base64Data=p.b64.split(',')[1];
    const safeName=('['+p.label+']No'+p.num+'_'+p.name).replace(/[\\\\/:*?"<>|]/g,'_');
    zip.file(safeName+'.jpg',base64Data,{base64:true});
  });
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='全体図写真一式.zip';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
renderPhotoList();

const allLatLngs=data.map(p=>[p.lat,p.lng]);
if(allLatLngs.length===1){map.setView(allLatLngs[0],17);}else{map.fitBounds(allLatLngs,{padding:[40,40]});}

function declutterExport(){
  const THRESH=54;
  const pts=data.map(p=>({p,pt:map.latLngToLayerPoint([p.lat,p.lng])}));
  const used=new Array(pts.length).fill(false);
  const groups=[];
  for(let i=0;i<pts.length;i++){
    if(used[i])continue;
    const group=[pts[i]];used[i]=true;
    for(let j=i+1;j<pts.length;j++){
      if(used[j])continue;
      if(pts[i].pt.distanceTo(pts[j].pt)<THRESH){group.push(pts[j]);used[j]=true;}
    }
    groups.push(group);
  }
  groups.forEach(group=>{
    if(group.length===1){
      group[0].p._disp=[group[0].p.lat,group[0].p.lng];
    }else{
      const n=group.length;
      const radius=58+Math.min(n,6)*10;
      const spread=Math.min(300,40*n);
      const start=-90-spread/2;
      group.forEach((g,idx)=>{
        const angleDeg=start+(n>1?(spread/(n-1))*idx:0);
        const rad=angleDeg*Math.PI/180;
        const offPt=L.point(g.pt.x+radius*Math.cos(rad),g.pt.y+radius*Math.sin(rad));
        const newLatLng=map.layerPointToLatLng(offPt);
        g.p._disp=[newLatLng.lat,newLatLng.lng];
      });
    }
  });
}
function renderMarkers(){
  if(window._markerLayer)map.removeLayer(window._markerLayer);
  if(window._lineLayer)map.removeLayer(window._lineLayer);
  window._markerLayer=L.layerGroup().addTo(map);
  window._lineLayer=L.layerGroup().addTo(map);
  declutterExport();
  data.forEach(p=>{
    const disp=p._disp||[p.lat,p.lng];
    const differs=Math.abs(disp[0]-p.lat)>1e-8||Math.abs(disp[1]-p.lng)>1e-8;
    if(differs){
      L.polyline([[p.lat,p.lng],disp],{color:p.color,weight:2,opacity:.75}).addTo(window._lineLayer);
      L.circleMarker([p.lat,p.lng],{radius:5,color:'#fff',weight:2,fillColor:p.color,fillOpacity:1}).addTo(window._lineLayer);
    }
    const sz=68;
    const icon=L.divIcon({className:'',html:'<div class="ph-mw" style="width:'+sz+'px;border-color:'+p.color+'"><div class="ph-mn" style="background:'+p.color+'">'+p.num+'</div><img src="'+p.b64+'" style="width:'+sz+'px;height:'+(sz*3/4|0)+'px"><div class="ph-ml">'+p.label+'</div></div>',iconSize:[sz+4,(sz*3/4|0)+20],iconAnchor:[sz/2+2,(sz*3/4|0)/2+10]});
    L.marker(disp,{icon}).addTo(window._markerLayer).on('click',()=>focusPhoto(p.id));
  });
}
renderMarkers();
map.on('zoomend moveend',renderMarkers);
<\/script></body></html>`;
}
</script>
</body></html>
