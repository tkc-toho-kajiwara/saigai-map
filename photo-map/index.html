<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Meiryo','Hiragino Sans',sans-serif;}
body{background:#f4f4f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:#185FA5;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.hdr h1{font-size:14px;font-weight:500;flex:1;}
.hdr-btns{display:flex;gap:6px;align-items:center;}
.btn-notion{background:#fff;color:#185FA5;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn-notion:hover{background:#e8f0fe;}
.sum{background:#fff;border-bottom:1px solid #ddd;padding:4px 14px;display:flex;gap:16px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.si{display:flex;flex-direction:column;align-items:center;}
.sn{font-size:18px;font-weight:600;color:#185FA5;line-height:1;}
.sl{font-size:10px;color:#888;margin-top:1px;}
.filters{background:#fff;border-bottom:1px solid #ddd;padding:5px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.filters label{font-size:11px;color:#666;}
.filters select{font-size:11px;padding:2px 6px;border:1px solid #ddd;border-radius:6px;}
.filters input{font-size:11px;padding:2px 8px;border:1px solid #ddd;border-radius:6px;width:140px;}
.fcnt{font-size:11px;color:#888;margin-left:auto;}
.main{display:flex;flex:1;overflow:hidden;}
#map{flex:1;}
.side{width:300px;overflow-y:auto;background:#f9f9f9;border-left:1px solid #ddd;flex-shrink:0;}
.side-item{padding:10px 12px;border-bottom:1px solid #eee;cursor:pointer;transition:background 0.1s;}
.side-item:hover{background:#e8f0fe;}
.side-item.active{background:#dbeafe;border-left:3px solid #185FA5;}
.si-name{font-size:12px;font-weight:600;color:#185FA5;word-break:break-all;}
.si-meta{font-size:10px;color:#888;margin-top:2px;}
.tile-ctrl{background:rgba(255,255,255,0.95);border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);padding:6px 10px;font-size:11px;}
.tile-ctrl b{font-size:11px;display:block;margin-bottom:4px;}
.tile-ctrl label{display:flex;align-items:center;gap:4px;cursor:pointer;padding:2px 0;}
.legend{background:rgba(255,255,255,0.95);border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);padding:8px 12px;font-size:11px;line-height:1.8;}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
.popup-box{min-width:240px;max-width:320px;font-size:12px;}
.popup-name{font-weight:bold;font-size:13px;color:#185FA5;margin-bottom:6px;word-break:break-all;}
.popup-img{width:100%;max-height:180px;object-fit:cover;border-radius:6px;margin:6px 0;cursor:pointer;}
.popup-pano{width:100%;height:200px;border-radius:6px;margin:6px 0;}
.popup-meta{color:#555;font-size:11px;line-height:1.7;}
.popup-btn{display:inline-block;margin-top:8px;padding:4px 12px;background:#185FA5;color:#fff;border-radius:4px;text-decoration:none;font-size:11px;margin-right:4px;}
.popup-btn.pano{background:#7C3AED;}
.popup-btn:hover{opacity:0.85;}
.no-photo{color:#999;font-size:11px;padding:6px 0;}
@media(max-width:640px){.side{display:none;}}
</style>
</head>

<div class="hdr">
  <h1>📷 写真配置図</h1>
  <div class="hdr-btns">

  </div>
</div>
<div class="sum">
  <div class="si"><span class="sn">119</span><span class="sl">総写真数</span></div>

  <div class="si"><span class="sn" style="color:#7C3AED">13</span><span class="sl">パノラマ360°</span></div>
  <div class="si"><span class="sn" id="cnt-filter" style="color:#666">-</span><span class="sl">表示中</span></div>
</div>
<div class="filters">
  <label>フォルダ</label>
  <select id="sel-folder" onchange="applyFilter()"><option value="">すべて</option></select>
  <label>種別</label>
  <select id="sel-type" onchange="applyFilter()">
    <option value="">すべて</option>
    <option value="通常">通常</option>
    <option value="パノラマ360°">パノラマ360°</option>
  </select>
  <label>検索</label>
  <input id="inp-search" type="text" placeholder="写真名を検索..." oninput="applyFilter()">
  <span class="fcnt" id="fcnt"></span>
</div>
<div class="main">
  <div id="map"></div>
  <div class="side" id="side-panel"></div>
</div>

const map = L.map('map').setView([33.35, 131.0], 11);

const tiles = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}),
  gsi:  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',{attribution:'© 国土地理院',maxZoom:18}),
  gmap: L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{attribution:'© Google Maps',maxZoom:20}),
  gsat: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{attribution:'© Google Satellite',maxZoom:20}),
};
tiles.osm.addTo(map);

const tileCtrl = L.control({position:'topright'});
tileCtrl.onAdd = () => {
  const div = L.DomUtil.create('div','tile-ctrl');
  div.innerHTML = `<b>地図切替</b>
    <label><input type="radio" name="tile" value="osm" checked> OpenStreetMap</label>
    <label><input type="radio" name="tile" value="gsi"> 地理院地図</label>
    <label><input type="radio" name="tile" value="gmap"> Google Map</label>
    <label><input type="radio" name="tile" value="gsat"> Google 衛星</label>`;
  L.DomEvent.disableClickPropagation(div);
  div.querySelectorAll('input[name=tile]').forEach(r => {
    r.addEventListener('change', e => {
      Object.values(tiles).forEach(t => map.removeLayer(t));
      tiles[e.target.value].addTo(map);
    });
  });
  return div;
};
tileCtrl.addTo(map);

const legend = L.control({position:'bottomright'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <span class="leg-dot" style="background:#1D9E75"></span>通常写真<br>
    <span class="leg-dot" style="background:#7C3AED"></span>パノラマ360°
  `;
  return div;
};
legend.addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className:'',
    html:`<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 23 13 23s13-13.25 13-23C26 5.82 20.18 0 13 0z"
            fill="${color}" stroke="#fff" stroke-width="1.5"/>
      <circle cx="13" cy="13" r="5.5" fill="#fff"/></svg>`,
    iconSize:[26,36],iconAnchor:[13,36],popupAnchor:[0,-36]
  });
}
const iconGreen  = makeIcon('#1D9E75');
const iconPurple = makeIcon('#7C3AED');

// パノラマビューア用カウンター
let panoCount = 0;

function buildPopup(p) {
  const isPano  = p.photo_type === 'パノラマ360°';
  const hasBox  = p.box_url && p.box_url.length > 0;

  let mediaHtml = '<p class="no-photo">📷 写真リンクなし</p>';
  let btnHtml   = '';

  // サムネイル画像パス（thumbs/ファイル名.jpg）
  const stem = p.name.replace(/\.[^.]+$/, '');
  const thumbUrl = 'thumbs/' + stem + '.jpg';

  if (isPano) {
    mediaHtml = `<img class="popup-img" src="${thumbUrl}"
                  onerror="this.style.display='none'"
                  onclick="window.open('${p.box_url}','_blank')"
                  title="クリックでBOXのパノラマを開く">`;
    btnHtml = `<a class="popup-btn pano" href="${p.box_url}" target="_blank">🌐 パノラマをBOXで開く</a>`;
  } else {
    mediaHtml = `<img class="popup-img" src="${thumbUrl}"
                  onerror="this.style.display='none'"
                  onclick="window.open('${p.box_url || thumbUrl}','_blank')"
                  title="クリックで拡大">`;
    if (hasBox) {
      btnHtml = `<a class="popup-btn" href="${p.box_url}" target="_blank">🔗 BOXで開く</a>`;
    }
  }

  return `<div class="popup-box">
    <div class="popup-name">${isPano ? '🌐 ' : '📷 '}${p.name}</div>
    ${mediaHtml}
    <div class="popup-meta">
      ${p.taken_at ? '📅 ' + p.taken_at.slice(0,10) + '<br>' : ''}
      ${p.folder && p.folder !== '.' ? '📁 ' + p.folder + '<br>' : ''}
      📍 ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}
    </div>
    ${btnHtml}
  </div>`;
}

const folders = [...new Set(ALL_PHOTOS.map(p => p.folder).filter(f => f && f !== '.'))];
const sel = document.getElementById('sel-folder');
folders.forEach(f => { const o=document.createElement('option'); o.value=f; o.textContent=f; sel.appendChild(o); });

let markers = [];

function buildSidePanel(filtered) {
  const side = document.getElementById('side-panel');
  side.innerHTML = '';
  filtered.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'side-item';
    div.id = 'side-' + i;
    const isPano = p.photo_type === 'パノラマ360°';
    div.innerHTML = `<div class="si-name">${isPano ? '🌐' : '📷'} ${p.name}</div>
      <div class="si-meta">${p.taken_at ? p.taken_at.slice(0,10) : ''} ${p.box_url ? '🔗' : ''}</div>`;
    div.onclick = () => {
      markers[i].openPopup();
      map.setView([p.lat, p.lon], 16);
      document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
    };
    side.appendChild(div);
  });
}

function applyFilter() {
  const folder = document.getElementById('sel-folder').value;
  const type   = document.getElementById('sel-type').value;
  const search = document.getElementById('inp-search').value.toLowerCase();

  const filtered = ALL_PHOTOS.filter(p => {
    if (folder && p.folder !== folder) return false;
    if (type   && p.photo_type !== type) return false;
    if (search && !p.name.toLowerCase().includes(search)) return false;
    return true;
  });

  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const bounds = [];

  filtered.forEach((p, i) => {
    const icon = p.photo_type === 'パノラマ360°' ? iconPurple : iconGreen;
    const m = L.marker([p.lat, p.lon], {icon})
      .addTo(map)
      .bindPopup(buildPopup(p), {maxWidth:340});
    m.on('click', () => {
      document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('side-' + i);
      if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
    });
    markers.push(m);
    bounds.push([p.lat, p.lon]);
  });

  if (bounds.length > 0) map.fitBounds(bounds, {padding:[40,40]});
  document.getElementById('cnt-filter').textContent = filtered.length;
  document.getElementById('fcnt').textContent = `${filtered.length} 件表示中`;
  buildSidePanel(filtered);
}

applyFilter();
